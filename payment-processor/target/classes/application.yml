server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: Qwerty#1234
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:payment-processor-group}
      topic:
        payments-submitted: ${KAFKA_TOPIC_PAYMENTS_SUBMITTED:payments-submitted}
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      listener-concurrency: ${SPRING_KAFKA_LISTENER_CONCURRENCY:3}
      ack-mode: manual
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      topic:
        payments-processed: ${KAFKA_TOPIC_PAYMENTS_PROCESSED:payments-processed}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      request-timeout-ms: 30000
      delivery-timeout-ms: 120000
      linger-ms: 5
      buffer-memory: 33554432
      compression-type: trade-off
      enable-idempotence: true
    listener:
      concurrency: ${SPRING_KAFKA_LISTENER_CONCURRENCY:3}

# Optional: kafkaRetryConfig retained for backward compatibility
kafkaRetryConfig:
  kafka-retry-max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}
  kafka-retry-back-off-period-ms: ${KAFKA_RETRY_BACK_OFF_PERIOD_MS:1000}

logging:
  level:
    org.apache.kafka: OFF
    kafka: OFF
    org.springframework.kafka: OFF
    org.apache.kafka.clients.producer: WARN
    org.apache.kafka.clients.consumer: WARN
